---
layout: default
---

<article class="post">
  <a href="/blogs.html" class="back-link">← Back to Blogs</a>
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date }}">{{ page.date | date: "%B %d, %Y" }}</time>
    </div>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
